<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🔥 Adult Games</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(180deg,#000,#1a0000);
color:white;
text-align:center;
}

header{
background:#111;
padding:20px;
border-bottom:2px solid red;
box-shadow:0 0 15px red;
}

header h1{
color:red;
font-size:40px;
}

.menu{
margin-top:10px;
}

.menu a{
color:white;
text-decoration:none;
margin:10px;
padding:8px 15px;
border:1px solid red;
border-radius:6px;
cursor:pointer;
}

.menu a:hover{
background:red;
}

#texto{
margin-top:20px;
font-size:22px;
color:#ff4d4d;
}

#listaJogos{
margin-top:20px;
display:none;
}

.jogo{
background:#111;
margin:10px auto;
padding:12px;
width:320px;
border:1px solid red;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.jogo:hover{
background:red;
}

.game-box{
width:960px;
height:540px;
margin:30px auto;
border:3px solid red;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 20px red;
background:black;
}

iframe{
width:100%;
height:100%;
border:none;
}

.social{
margin-top:20px;
}

.insta{
display:inline-block;
background:#E1306C;
padding:10px 20px;
border-radius:8px;
color:white;
text-decoration:none;
font-size:16px;
transition:0.3s;
}

.insta:hover{
background:#ff4f8b;
transform:scale(1.05);
}

footer{
margin-top:30px;
padding:15px;
background:#111;
border-top:1px solid red;
color:#aaa;
}

</style>
</head>

<body>

<header>

<h1>🔥 ADULT GAMES 🔥</h1>

<div class="menu">
<a onclick="home()">Home</a>
<a onclick="jogos()">Jogos</a>
</div>

</header>

<div id="texto">😈 Bem-vindo... divirta-se 🔥</div>

<div id="listaJogos">

<div class="jogo" onclick="jogo1()">
🔥 Dungeon Monsters
</div>

</div>

<div class="game-box">
<iframe id="player"></iframe>
</div>

<div class="social">
<a class="insta" href="https://instagram.com/zakmodz1" target="_blank">
📸 Instagram @zakmodz1
</a>
</div>

<footer>
🔞 Site +18 | Divirta-se 😈🔥
</footer>

<script>

function home(){
document.getElementById("texto").innerHTML="😈 Bem-vindo ao site... divirta-se 🔥";
document.getElementById("listaJogos").style.display="none";
document.getElementById("player").src="";
}

function jogos(){
document.getElementById("texto").innerHTML="🔥 Escolha um jogo e divirta-se 😈";
document.getElementById("listaJogos").style.display="block";
}

function jogo1(){
document.getElementById("texto").innerHTML="😈 Jogando... divirta-se 🔥";
document.getElementById("player").src="https://collegesexgames.com/swf/cdn/1287/";
}

</script>

</body>
</html>
