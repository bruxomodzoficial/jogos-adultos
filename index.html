:root {
    --red-glow: #ff0000;
    --dark-bg: #050505;
    --card-bg: rgba(20, 20, 20, 0.8);
    --neon-border: 2px solid #ff1a1a;
    --neon-shadow: 0 0 15px rgba(255,0,0,0.6), inset 0 0 10px rgba(255,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }

body {
    background-color: var(--dark-bg);
    background-image: radial-gradient(circle at center, #1a0000 0%, #000 100%);
    color:white;
    padding-bottom:50px;
}

header {
    background: linear-gradient(to bottom, rgba(40,0,0,0.5), transparent);
    padding:25px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid rgba(255,0,0,0.2);
}

.logo {
    font-family:'Orbitron', sans-serif;
    color:#ff1a1a;
    font-size:28px;
    display:flex;
    align-items:center;
    gap:10px;
    text-shadow:0 0 15px #ff0000;
}

.nav-menu { display:flex; gap:15px; }

.nav-menu button {
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.3);
    color:white;
    padding:8px 25px;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
    text-transform:uppercase;
    font-size:12px;
    transition:0.3s;
}

.nav-menu button:hover {
    background:#ff1a1a;
    border-color:#ff1a1a;
    box-shadow:0 0 15px #ff1a1a;
}

.welcome-msg {
    text-align:center;
    margin:40px 0;
    font-size:20px;
    text-transform:uppercase;
    letter-spacing:2px;
}

.welcome-msg span { color:#ff1a1a; font-weight:bold; }

.main-container { max-width:1100px; margin:0 auto; padding:0 20px; }

.grid-jogos {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-bottom:40px;
}

.card {
    background:var(--card-bg);
    border:var(--neon-border);
    border-radius:12px;
    height:160px;
    display:flex;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
    box-shadow:var(--neon-shadow);
}

.card:hover { transform:scale(1.03); box-shadow:0 0 25px rgba(255,0,0,0.8); }

.card-thumb {
    width:45%;
    height:100%;
    background-size:cover;
    background-position:center;
    border-right:1px solid rgba(255,0,0,0.3);
    background-color:#111;
}

.card-content {
    width:55%;
    padding:15px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.card-content h3 {
    font-size:14px;
    text-transform:uppercase;
    margin-bottom:15px;
    font-family:'Orbitron', sans-serif;
    letter-spacing:1px;
}

.btn-jogar {
    background:#ff1a1a;
    color:white;
    border:none;
    padding:6px 15px;
    border-radius:15px;
    font-size:10px;
    font-weight:bold;
    cursor:pointer;
    text-transform:uppercase;
    box-shadow:0 0 10px #ff0000;
}

.player-container {
    width:100%;
    max-width:800px;
    aspect-ratio:16/9;
    margin:40px auto;
    border:var(--neon-border);
    border-radius:15px;
    box-shadow:var(--neon-shadow);
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

#player-frame { width:100%; height:100%; border:none; display:none; }

.placeholder-text { color:#444; text-align:center; font-size:14px; text-transform:uppercase; }

.footer-social { text-align:center; margin:30px 0; }

.insta-btn {
    color:white;
    text-decoration:none;
    font-size:12px;
    border:1px solid rgba(255,255,255,0.2);
    padding:8px 20px;
    border-radius:20px;
    transition:0.3s;
}

.insta-btn:hover { background: rgba(255,255,255,0.1); }

footer { text-align:center; font-size:10px; color:#666; margin-top:40px; text-transform:uppercase; }

@media (max-width:768px) {
    .grid-jogos { grid-template-columns:1fr; }
}
</style>
